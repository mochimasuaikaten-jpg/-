<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客台帳管理システム</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-primary {
            background: white;
            color: #2c3e50;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .search-bar {
            padding: 20px 30px;
            border-bottom: 2px solid #f0f0f0;
            background: #f8f9fa;
        }

        .search-bar input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .customers-list {
            width: 350px;
            border-right: 2px solid #f0f0f0;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .sort-controls {
            padding: 10px 15px;
            background: white;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .sort-controls select {
            flex: 1;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.9em;
        }

        .sort-controls button {
            padding: 8px 12px;
            border: none;
            background: #3498db;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            white-space: nowrap;
        }

        .group-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .group-header:hover {
            filter: brightness(1.1);
        }

        .group-header .group-toggle {
            transition: transform 0.2s;
        }

        .group-header.collapsed .group-toggle {
            transform: rotate(-90deg);
        }

        .group-content {
            overflow: hidden;
            max-height: 50000px;
            transition: max-height 0.4s ease;
        }

        .group-content.collapsed {
            max-height: 0;
        }

        .customer-item {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .customer-item.dragging {
            opacity: 0.5;
        }

        .customer-item.drag-over {
            border-top: 3px solid #3498db;
        }

        .customer-item[draggable="true"] {
            cursor: move;
        }

        .customer-item:hover {
            background: #e8f0fe;
        }

        .customer-item.active {
            background: #3498db;
            color: white;
        }

        .customer-item.unpaid {
            border-left: 4px solid #e74c3c;
        }

        .customer-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .customer-info-preview {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .details-panel {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .customer-header {
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .customer-title {
            font-size: 2em;
            color: #333;
        }

        .customer-actions {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            background: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1em;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #3498db;
            border-bottom-color: #3498db;
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .info-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            font-weight: 600;
        }

        .info-value {
            font-size: 1em;
            color: #333;
        }

        .payment-record {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            margin-bottom: 10px;
        }

        .payment-record.unpaid {
            border-left-color: #e74c3c;
        }

        .payment-date {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .payment-amount {
            font-size: 1.2em;
            color: #27ae60;
            font-weight: bold;
        }

        .payment-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .payment-status.paid {
            background: #d4edda;
            color: #155724;
        }

        .payment-status.unpaid {
            background: #f8d7da;
            color: #721c24;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            overflow-y: auto;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin: 20px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
        }

        .btn-save {
            background: #27ae60;
            color: white;
        }

        .btn-cancel {
            background: #95a5a6;
            color: white;
        }

        .alert-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 8px;
            background: #e74c3c;
            color: white;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .customers-list {
                width: 100%;
                max-height: 200px;
                border-right: none;
                border-bottom: 2px solid #f0f0f0;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="margin-bottom:10px;">
                <a href="index.html" style="color:white; background:rgba(255,255,255,0.2); padding:8px 20px; border-radius:20px; text-decoration:none; font-size:0.9em; font-weight:bold;">← 🌸 来店記録へ</a>
            </div>
            <h1>🏪 顧客台帳管理システム</h1>
            <div class="header-actions">
                <button class="btn-primary" onclick="openCustomerModal()">➕ 新規顧客追加</button>
                <button class="btn-primary" onclick="openGroupModal()">📁 グループ管理</button>
                <button class="btn-primary" onclick="openSendList()" id="btnSendList">📮 受領書送付リスト</button>
                <button class="btn-primary" onclick="exportData()">📤 データ書き出し</button>
                <button class="btn-primary" onclick="document.getElementById('importFile').click()">📥 データ読み込み</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            </div>
            <div id="summaryBar" style="display:flex; gap:20px; justify-content:center; margin-top:15px; flex-wrap:wrap;">
                <div style="background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:10px;">
                    <span style="font-size:0.85em;">総件数</span>
                    <span id="totalCount" style="font-size:1.3em; font-weight:bold; margin-left:8px;">0</span><span style="font-size:0.85em;">件</span>
                </div>
                <div style="background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:10px;">
                    <span style="font-size:0.85em;">契約金額合計</span>
                    <span id="totalContract" style="font-size:1.3em; font-weight:bold; margin-left:8px;">¥0</span>
                </div>
                <div style="background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:10px;">
                    <span style="font-size:0.85em;">供花料合計</span>
                    <span id="totalFlower" style="font-size:1.3em; font-weight:bold; margin-left:8px;">¥0</span>
                </div>
                <div style="background:rgba(255,255,255,0.15); padding:8px 20px; border-radius:10px;">
                    <span style="font-size:0.85em;">総合計</span>
                    <span id="grandTotal" style="font-size:1.3em; font-weight:bold; margin-left:8px; color:#f1c40f;">¥0</span>
                </div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 顧客名・墓名・場所で検索..." onkeyup="searchCustomers()">
        </div>

        <div class="main-content">
            <div class="customers-list">
                <div class="sort-controls">
                    <select id="sortOrder" onchange="changeSortOrder()">
                        <option value="name">五十音順</option>
                        <option value="contractType">契約タイプ別</option>
                        <option value="sales">売上ランキング</option>
                        <option value="visit">来店回数順</option>
                        <option value="manual">手動並び替え</option>
                        <option value="group">グループ表示</option>
                    </select>
                </div>
                <div id="customersList">
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>顧客がいません</p>
                    </div>
                </div>
            </div>

            <div class="details-panel" id="detailsPanel">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <p>左から顧客を選択してください</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 顧客追加/編集モーダル -->
    <div id="customerModal" class="modal">
        <div class="modal-content">
            <h2 id="customerModalTitle">新規顧客追加</h2>
            <form id="customerForm">
                <h3 style="margin-bottom: 15px; color: #3498db;">基本情報</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>墓名（家名）*</label>
                        <input type="text" id="graveName" required placeholder="例: 山田家">
                    </div>
                    <div class="form-group">
                        <label>読みがな（五十音順用）</label>
                        <input type="text" id="yomi" placeholder="例: やまだ">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>管理者名*</label>
                        <input type="text" id="managerName" required placeholder="例: 山田太郎">
                    </div>
                    <div class="form-group">
                        <label>管理者名 読みがな</label>
                        <input type="text" id="managerYomi" placeholder="例: やまだたろう">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>電話番号</label>
                        <input type="tel" id="phone" placeholder="090-1234-5678">
                    </div>
                    <div class="form-group">
                        <label>メールアドレス</label>
                        <input type="email" id="email" placeholder="example@email.com">
                    </div>
                </div>
                <div class="form-group">
                    <label>住所</label>
                    <input type="text" id="address" placeholder="鹿児島県...">
                </div>
                <div class="form-group">
                    <label>送付先住所 <span style="font-size:0.8em; color:#999; font-weight:normal;">（住所と異なる場合のみ）</span></label>
                    <input type="text" id="mailAddress" placeholder="受領書・写真の送り先が別の場合">
                </div>

                <div class="form-group">
                    <label>グループ</label>
                    <select id="customerGroup">
                        <option value="">なし</option>
                    </select>
                </div>

                <h3 style="margin: 25px 0 15px; color: #3498db;">墓地情報</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>霊園・墓地名</label>
                        <input type="text" id="cemetery" placeholder="〇〇霊園">
                    </div>
                    <div class="form-group">
                        <label>区画番号</label>
                        <input type="text" id="plotNumber" placeholder="A-123">
                    </div>
                </div>
                <div class="form-group">
                    <label>場所・アクセス</label>
                    <textarea id="location" rows="2" placeholder="霊園内の位置、行き方など"></textarea>
                </div>

                <h3 style="margin: 25px 0 15px; color: #3498db;">契約情報</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>契約プラン*</label>
                        <select id="contractPlan" onchange="updateDefaultAmount()">
                            <option value="annual">年間プラン</option>
                            <option value="quarterly">年４回プラン</option>
                            <option value="flower">定期供花プラン</option>
                            <option value="weeding">草むしりプラン</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>契約金額（円）</label>
                        <input type="number" id="contractAmount" placeholder="10000">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>供花料（円）</label>
                        <input type="number" id="flowerFee" placeholder="0" oninput="updateTotalDisplay()">
                    </div>
                    <div class="form-group">
                        <label>総額（円）</label>
                        <input type="text" id="totalAmount" readonly style="background: #e8f0fe; font-weight: bold; color: #2c3e50;">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>支払いサイクル</label>
                        <select id="paymentCycle" onchange="updateDefaultAmount()">
                            <option value="yearly">年払い</option>
                            <option value="halfyearly">半年払い</option>
                            <option value="onetime">都度払い</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>1回の支払額（円）</label>
                        <input type="number" id="perPaymentAmount" placeholder="手入力も可" style="font-weight: bold; color: #2c3e50;" oninput="markPerPaymentManual()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>契約開始日</label>
                        <input type="date" id="contractStart">
                    </div>
                    <div class="form-group">
                        <label>前回支払い日付</label>
                        <input type="date" id="lastPaymentDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>支払人</label>
                        <input type="text" id="payer" placeholder="例: 山田太郎">
                    </div>
                    <div class="form-group">
                        <label>支払い方法</label>
                        <select id="customerPaymentMethod">
                            <option value="">未設定</option>
                            <option value="cash">現金</option>
                            <option value="transfer">銀行振込</option>
                            <option value="card">カード</option>
                            <option value="other">その他</option>
                        </select>
                    </div>
                </div>
                <div style="background: #e8f5e9; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-weight: 600; margin-bottom: 10px; color: #2c3e50;">💰 入金済み期間</div>
                    <div class="form-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>開始月</label>
                            <input type="month" id="paidPeriodStart" placeholder="例: 2026-01">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>終了月</label>
                            <input type="month" id="paidPeriodEnd" placeholder="例: 2026-06">
                        </div>
                    </div>
                </div>
                <div style="background: #fff3e0; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-weight: 600; margin-bottom: 10px; color: #2c3e50;">📅 次回入金予定期間</div>
                    <div class="form-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>開始月</label>
                            <input type="month" id="nextPaymentStart" placeholder="例: 2026-07">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>終了月</label>
                            <input type="month" id="nextPaymentEnd" placeholder="例: 2026-12">
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>契約ステータス</label>
                        <select id="contractStatus">
                            <option value="active">有効</option>
                            <option value="suspended">停止中</option>
                            <option value="ended">終了</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>備考</label>
                    <textarea id="contractNotes" rows="2" placeholder="契約の詳細内容など"></textarea>
                </div>

                <h3 style="margin: 25px 0 15px; color: #3498db;">その他</h3>
                <div class="form-group">
                    <label>来店回数</label>
                    <input type="number" id="visitCount" placeholder="0" min="0">
                </div>
                <div class="form-group">
                    <label>特記事項</label>
                    <textarea id="notes" rows="3" placeholder="好みの花、アレルギー、その他特別な要望など"></textarea>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="btn-save">保存</button>
                    <button type="button" class="btn-cancel" onclick="closeCustomerModal()">キャンセル</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 入金記録追加モーダル -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <h2>入金記録追加</h2>
            <form id="paymentForm">
                <div class="form-group">
                    <label>入金日*</label>
                    <input type="date" id="paymentDate" required>
                </div>
                <div class="form-group">
                    <label>金額（円）*</label>
                    <input type="number" id="paymentAmount" required placeholder="10000">
                </div>
                <div class="form-group">
                    <label>支払い方法</label>
                    <select id="paymentMethod">
                        <option value="cash">現金</option>
                        <option value="transfer">銀行振込</option>
                        <option value="card">カード</option>
                    </select>
                </div>
                <div style="background: #f0f8ff; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <div style="font-weight: 600; margin-bottom: 10px; color: #2c3e50;">📅 対象期間</div>
                    <div class="form-row">
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>開始日</label>
                            <input type="date" id="periodStart">
                        </div>
                        <div class="form-group" style="margin-bottom: 0;">
                            <label>終了日</label>
                            <input type="date" id="periodEnd">
                        </div>
                    </div>
                    <div style="font-size: 0.85em; color: #666; margin-top: 8px;">
                        例: 2026年7月1日 〜 2026年12月31日
                    </div>
                </div>
                <div class="form-group">
                    <label>メモ</label>
                    <textarea id="paymentMemo" rows="2"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">追加</button>
                    <button type="button" class="btn-cancel" onclick="closePaymentModal()">キャンセル</button>
                </div>
            </form>
        </div>
    </div>

    <!-- グループ管理モーダル -->
    <!-- 受領書送付リストモーダル -->
    <div id="sendListModal" class="modal">
        <div class="modal-content" style="max-width: 700px; max-height: 90vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">📮 受領書送付リスト</h2>
                <button onclick="closeSendList()" style="background: none; border: none; font-size: 1.5em; cursor: pointer; color: #999;">✕</button>
            </div>
            <div id="sendListContent"></div>
        </div>
    </div>

    <div id="groupModal" class="modal">
        <div class="modal-content">
            <h2>📁 グループ管理</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <input type="text" id="newGroupName" placeholder="新しいグループ名" style="flex:1; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;">
                <button class="btn-secondary" onclick="addGroup()" style="white-space: nowrap;">追加</button>
            </div>
            <div id="groupList"></div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" onclick="closeGroupModal()">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let customers = JSON.parse(localStorage.getItem('customerLedger')) || [];
        let selectedCustomerId = null;
        let editingCustomerId = null;
        let currentTab = 'basic';
        let groups = JSON.parse(localStorage.getItem('customerGroups')) || [];
        let sortOrder = localStorage.getItem('ledgerSortOrder') || 'name';
        let manualOrder = JSON.parse(localStorage.getItem('ledgerManualOrder')) || [];
        let collapsedGroups = JSON.parse(localStorage.getItem('ledgerCollapsedGroups')) || [];

        function saveData() {
            localStorage.setItem('customerLedger', JSON.stringify(customers));
            localStorage.setItem('customerGroups', JSON.stringify(groups));
            localStorage.setItem('ledgerSortOrder', sortOrder);
            localStorage.setItem('ledgerManualOrder', JSON.stringify(manualOrder));
            localStorage.setItem('ledgerCollapsedGroups', JSON.stringify(collapsedGroups));
            updateSummary();
        }

        function exportData() {
            const data = {
                customers: customers,
                groups: groups,
                sortOrder: sortOrder,
                manualOrder: manualOrder,
                exportedAt: new Date().toISOString()
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const date = new Date().toISOString().slice(0, 10);
            a.href = url;
            a.download = '顧客台帳_' + date + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.customers) { alert('ファイルの形式が正しくありません'); return; }
                    if (!confirm(`${data.customers.length}件のデータを読み込みます。現在のデータは上書きされます。よろしいですか？`)) return;
                    customers = data.customers;
                    if (data.groups) groups = data.groups;
                    if (data.manualOrder) manualOrder = data.manualOrder;
                    saveData();
                    renderCustomersList();
                    renderDetailsPanel();
                    alert('読み込み完了しました');
                } catch(err) {
                    alert('読み込みエラー: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function updateSummary() {
            const count = customers.length;
            const contractSum = customers.reduce((s, c) => s + (c.contractAmount || 0), 0);
            const flowerSum = customers.reduce((s, c) => s + (c.flowerFee || 0), 0);
            document.getElementById('totalCount').textContent = count;
            document.getElementById('totalContract').textContent = '¥' + contractSum.toLocaleString();
            document.getElementById('totalFlower').textContent = '¥' + flowerSum.toLocaleString();
            document.getElementById('grandTotal').textContent = '¥' + (contractSum + flowerSum).toLocaleString();
        }

        function changeSortOrder() {
            sortOrder = document.getElementById('sortOrder').value;
            localStorage.setItem('ledgerSortOrder', sortOrder);
            renderCustomersList();
        }

        function renderCustomerItem(customer, isDraggable) {
            const hasUnpaid = customer.payments && customer.payments.some(p => p.status === 'unpaid');
            return `
                <div class="customer-item ${selectedCustomerId === customer.id ? 'active' : ''} ${hasUnpaid ? 'unpaid' : ''}"
                     data-customer-id="${customer.id}"
                     ${isDraggable ? 'draggable="true"' : ''}
                     onclick="selectCustomer(${customer.id})">
                    <div class="customer-name">
                        ${customer.graveName}
                        ${hasUnpaid ? '<span class="alert-badge">未払</span>' : ''}
                    </div>
                    <div class="customer-info-preview">
                        👤 ${customer.managerName}<br>
                        📍 ${customer.cemetery || '未設定'}
                    </div>
                </div>
            `;
        }

        function renderCustomersList() {
            const list = document.getElementById('customersList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            const filteredCustomers = customers.filter(c =>
                c.graveName.toLowerCase().includes(searchTerm) ||
                (c.yomi && c.yomi.toLowerCase().includes(searchTerm)) ||
                c.managerName.toLowerCase().includes(searchTerm) ||
                (c.managerYomi && c.managerYomi.toLowerCase().includes(searchTerm)) ||
                (c.cemetery && c.cemetery.toLowerCase().includes(searchTerm)) ||
                (c.location && c.location.toLowerCase().includes(searchTerm))
            );

            if (filteredCustomers.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">👥</div>
                        <p>${searchTerm ? '該当する顧客がいません' : '顧客がいません'}</p>
                    </div>
                `;
                return;
            }

            const isDraggable = sortOrder === 'manual';

            if (sortOrder === 'name') {
                // 五十音行ごとにグループ表示
                const gyouMap = [
                    { key: 'ア行', test: /^[ぁ-おァ-オa-eA-E]/ },
                    { key: 'カ行', test: /^[か-ごカ-ゴ]/ },
                    { key: 'サ行', test: /^[さ-ぞサ-ゾ]/ },
                    { key: 'タ行', test: /^[た-どタ-ド]/ },
                    { key: 'ナ行', test: /^[な-のナ-ノ]/ },
                    { key: 'ハ行', test: /^[は-ぽハ-ポ]/ },
                    { key: 'マ行', test: /^[ま-もマ-モ]/ },
                    { key: 'ヤ行', test: /^[や-よヤ-ヨ]/ },
                    { key: 'ラ行', test: /^[ら-ろラ-ロ]/ },
                    { key: 'ワ行', test: /^[わ-んワ-ン]/ },
                ];
                function getGyou(c) {
                    const y = (c.yomi || c.graveName).toLowerCase();
                    for (const g of gyouMap) {
                        if (g.test.test(y)) return g.key;
                    }
                    return 'その他';
                }
                // グループごとに分類
                const grouped = {};
                filteredCustomers.forEach(c => {
                    const g = getGyou(c);
                    if (!grouped[g]) grouped[g] = [];
                    grouped[g].push(c);
                });
                // 各グループ内を五十音順にソート
                Object.values(grouped).forEach(arr => {
                    arr.sort((a, b) => (a.yomi || a.graveName).localeCompare((b.yomi || b.graveName), 'ja'));
                });
                // 表示順序
                const gyouOrder = gyouMap.map(g => g.key).concat(['その他']);
                let html = '';
                gyouOrder.forEach(gKey => {
                    const members = grouped[gKey];
                    if (!members || members.length === 0) return;
                    const isCollapsed = collapsedGroups.includes('gyou_' + gKey);
                    html += `
                        <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('gyou_${gKey}')">
                            <span>${gKey}（${members.length}件）</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-content ${isCollapsed ? 'collapsed' : ''}">
                            ${members.map(c => renderCustomerItem(c, false)).join('')}
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else if (sortOrder === 'contractType') {
                const typeMap = [
                    { key: 'annual', label: '年間契約', icon: '📋' },
                    { key: 'quarterly', label: '年４回プラン', icon: '🗓' },
                    { key: 'flower', label: '定期供花', icon: '💐' },
                    { key: 'weeding', label: '草むしり', icon: '🌿' },
                    { key: '_none', label: '未設定', icon: '📂' },
                ];
                const grouped = {};
                filteredCustomers.forEach(c => {
                    const t = c.contractPlan || '_none';
                    if (!grouped[t]) grouped[t] = [];
                    grouped[t].push(c);
                });
                Object.values(grouped).forEach(arr => {
                    arr.sort((a, b) => (a.yomi || a.graveName).localeCompare((b.yomi || b.graveName), 'ja'));
                });
                let html = '';
                typeMap.forEach(t => {
                    const members = grouped[t.key];
                    if (!members || members.length === 0) return;
                    const isCollapsed = collapsedGroups.includes('ct_' + t.key);
                    html += `
                        <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('ct_${t.key}')">
                            <span>${t.icon} ${t.label}（${members.length}件）</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-content ${isCollapsed ? 'collapsed' : ''}">
                            ${members.map(c => renderCustomerItem(c, false)).join('')}
                        </div>
                    `;
                });
                list.innerHTML = html;
            } else if (sortOrder === 'group') {
                // グループ表示
                let html = '';
                groups.forEach(group => {
                    const groupCustomers = filteredCustomers.filter(c => c.group === group.id);
                    if (groupCustomers.length === 0) return;
                    const isCollapsed = collapsedGroups.includes(group.id);
                    html += `
                        <div class="group-header ${isCollapsed ? 'collapsed' : ''}" onclick="toggleGroup('${group.id}')">
                            <span>📁 ${group.name}（${groupCustomers.length}件）</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-content ${isCollapsed ? 'collapsed' : ''}">
                            ${groupCustomers.sort((a, b) => (a.yomi || a.graveName).localeCompare((b.yomi || b.graveName), 'ja')).map(c => renderCustomerItem(c, false)).join('')}
                        </div>
                    `;
                });
                // グループ未設定の顧客
                const ungrouped = filteredCustomers.filter(c => !c.group || !groups.find(g => g.id === c.group));
                if (ungrouped.length > 0) {
                    const isCollapsed = collapsedGroups.includes('_ungrouped');
                    html += `
                        <div class="group-header ${isCollapsed ? 'collapsed' : ''}" style="background: #95a5a6;" onclick="toggleGroup('_ungrouped')">
                            <span>📂 未分類（${ungrouped.length}件）</span>
                            <span class="group-toggle">▼</span>
                        </div>
                        <div class="group-content ${isCollapsed ? 'collapsed' : ''}">
                            ${ungrouped.sort((a, b) => (a.yomi || a.graveName).localeCompare((b.yomi || b.graveName), 'ja')).map(c => renderCustomerItem(c, false)).join('')}
                        </div>
                    `;
                }
                list.innerHTML = html;
            } else if (sortOrder === 'sales') {
                const sorted = [...filteredCustomers].sort((a, b) => {
                    const aTotal = (a.contractAmount || 0) + (a.flowerFee || 0);
                    const bTotal = (b.contractAmount || 0) + (b.flowerFee || 0);
                    return bTotal - aTotal;
                });
                list.innerHTML = sorted.map((c, i) => {
                    const total = (c.contractAmount || 0) + (c.flowerFee || 0);
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i+1}.`;
                    return `<div style="display:flex; align-items:center; gap:6px; padding: 2px 8px; background:#f9f9f9; border-bottom:1px solid #eee; font-size:0.8em; color:#888;">${medal} ¥${total.toLocaleString()}/年</div>` + renderCustomerItem(c, false);
                }).join('');
            } else if (sortOrder === 'visit') {
                const sorted = [...filteredCustomers].sort((a, b) => {
                    return (b.visitCount || 0) - (a.visitCount || 0);
                });
                list.innerHTML = sorted.map((c, i) => {
                    const cnt = c.visitCount || 0;
                    return `<div style="display:flex; align-items:center; gap:6px; padding: 2px 8px; background:#f9f9f9; border-bottom:1px solid #eee; font-size:0.8em; color:#888;">${i+1}. 来店 ${cnt}回</div>` + renderCustomerItem(c, false);
                }).join('');
            } else if (sortOrder === 'manual') {
                const sorted = [...filteredCustomers].sort((a, b) => {
                    const ai = manualOrder.indexOf(a.id);
                    const bi = manualOrder.indexOf(b.id);
                    if (ai === -1 && bi === -1) return 0;
                    if (ai === -1) return 1;
                    if (bi === -1) return -1;
                    return ai - bi;
                });
                list.innerHTML = sorted.map(c => renderCustomerItem(c, true)).join('');
                setupDragDrop(list);
            }
        }

        function toggleGroup(groupId) {
            const idx = collapsedGroups.indexOf(groupId);
            if (idx === -1) {
                collapsedGroups.push(groupId);
            } else {
                collapsedGroups.splice(idx, 1);
            }
            localStorage.setItem('ledgerCollapsedGroups', JSON.stringify(collapsedGroups));
            renderCustomersList();
        }

        // ドラッグ&ドロップ
        let draggedEl = null;

        function setupDragDrop(list) {
            const items = list.querySelectorAll('.customer-item');
            items.forEach(item => {
                item.addEventListener('dragstart', function(e) {
                    draggedEl = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });
                item.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                    this.classList.add('drag-over');
                });
                item.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });
                item.addEventListener('drop', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    if (draggedEl !== this) {
                        const allItems = Array.from(list.querySelectorAll('.customer-item'));
                        const dragIdx = allItems.indexOf(draggedEl);
                        const targetIdx = allItems.indexOf(this);
                        const currentOrder = allItems.map(el => parseInt(el.dataset.customerId));
                        const moved = currentOrder.splice(dragIdx, 1)[0];
                        currentOrder.splice(targetIdx, 0, moved);
                        manualOrder = currentOrder;
                        localStorage.setItem('ledgerManualOrder', JSON.stringify(manualOrder));
                        renderCustomersList();
                    }
                });
                item.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    list.querySelectorAll('.customer-item').forEach(el => el.classList.remove('drag-over'));
                });
            });
        }

        // グループ管理
        function openGroupModal() {
            renderGroupList();
            document.getElementById('groupModal').classList.add('active');
        }

        function closeGroupModal() {
            document.getElementById('groupModal').classList.remove('active');
        }

        function addGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) return;
            groups.push({ id: 'g_' + Date.now(), name: name });
            document.getElementById('newGroupName').value = '';
            saveData();
            renderGroupList();
            updateGroupSelects();
        }

        function deleteGroup(groupId) {
            if (!confirm('このグループを削除しますか？（顧客は削除されません）')) return;
            groups = groups.filter(g => g.id !== groupId);
            customers.forEach(c => { if (c.group === groupId) c.group = ''; });
            saveData();
            renderGroupList();
            updateGroupSelects();
            renderCustomersList();
        }

        function renderGroupList() {
            const container = document.getElementById('groupList');
            if (groups.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">グループがありません</p>';
                return;
            }
            container.innerHTML = groups.map(g => {
                const count = customers.filter(c => c.group === g.id).length;
                return `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px;">
                        <span style="font-weight: 600;">📁 ${g.name}（${count}件）</span>
                        <button class="btn-danger" style="padding: 6px 12px; font-size: 0.85em;" onclick="deleteGroup('${g.id}')">削除</button>
                    </div>
                `;
            }).join('');
        }

        function updateGroupSelects() {
            const select = document.getElementById('customerGroup');
            const currentVal = select.value;
            select.innerHTML = '<option value="">なし</option>' + groups.map(g =>
                `<option value="${g.id}">${g.name}</option>`
            ).join('');
            select.value = currentVal;
        }

        function selectCustomer(customerId) {
            selectedCustomerId = customerId;
            currentTab = 'basic';
            renderCustomersList();
            renderDetailsPanel();
        }

        function searchCustomers() {
            renderCustomersList();
        }

        function renderDetailsPanel() {
            const panel = document.getElementById('detailsPanel');
            const customer = customers.find(c => c.id === selectedCustomerId);

            if (!customer) {
                panel.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <p>左から顧客を選択してください</p>
                    </div>
                `;
                return;
            }

            panel.innerHTML = `
                <div class="customer-header">
                    <div class="customer-title">${customer.graveName}</div>
                    <div class="customer-actions">
                        <button class="btn-secondary" onclick="editCustomer(${customer.id})">✏️ 編集</button>
                        <button class="btn-danger" onclick="deleteCustomer(${customer.id})">削除</button>
                    </div>
                </div>

                <div class="tabs">
                    <button class="tab ${currentTab === 'basic' ? 'active' : ''}" onclick="switchTab('basic')">基本情報</button>
                    <button class="tab ${currentTab === 'contract' ? 'active' : ''}" onclick="switchTab('contract')">契約・入金</button>
                </div>

                <div class="tab-content ${currentTab === 'basic' ? 'active' : ''}" id="basicTab">
                    ${renderBasicInfo(customer)}
                </div>

                <div class="tab-content ${currentTab === 'contract' ? 'active' : ''}" id="contractTab">
                    ${renderContractInfo(customer)}
                </div>
            `;
        }

        function renderBasicInfo(customer) {
            return `
                <div class="info-section">
                    <h3>連絡先情報</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">管理者名</span>
                            <span class="info-value">${customer.managerName}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">電話番号</span>
                            <span class="info-value">${customer.phone || '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">メールアドレス</span>
                            <span class="info-value">${customer.email || '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">住所</span>
                            <span class="info-value">${customer.address || '未設定'}</span>
                        </div>
                    </div>
                </div>

                <div class="info-section">
                    <h3>墓地情報</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">霊園・墓地名</span>
                            <span class="info-value">${customer.cemetery || '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">区画番号</span>
                            <span class="info-value">${customer.plotNumber || '未設定'}</span>
                        </div>
                    </div>
                    ${customer.location ? `
                        <div class="info-item" style="margin-top: 15px;">
                            <span class="info-label">場所・アクセス</span>
                            <span class="info-value">${customer.location}</span>
                        </div>
                    ` : ''}
                </div>

                ${customer.notes ? `
                    <div class="info-section">
                        <h3>特記事項</h3>
                        <p style="white-space: pre-wrap;">${customer.notes}</p>
                    </div>
                ` : ''}
            `;
        }

        function renderContractInfo(customer) {
            const payments = customer.payments || [];
            const totalPaid = payments.filter(p => p.status === 'paid').reduce((sum, p) => sum + p.amount, 0);
            const unpaidCount = payments.filter(p => p.status === 'unpaid').length;

            return `
                <div class="info-section">
                    <h3>契約情報</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">契約プラン</span>
                            <span class="info-value">${getContractPlanText(customer.contractPlan)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">契約金額</span>
                            <span class="info-value">${customer.contractAmount ? '¥' + customer.contractAmount.toLocaleString() : '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">供花料</span>
                            <span class="info-value">${customer.flowerFee ? '¥' + customer.flowerFee.toLocaleString() : 'なし'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">総額</span>
                            <span class="info-value" style="font-weight: bold; color: #2c3e50;">¥${((customer.contractAmount || 0) + (customer.flowerFee || 0)).toLocaleString()}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">支払いサイクル</span>
                            <span class="info-value">${getPaymentCycleText(customer.paymentCycle)}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">1回の支払額</span>
                            <span class="info-value" style="font-weight: bold;">¥${(customer.perPaymentAmount || ((customer.contractAmount || 0) + (customer.flowerFee || 0))).toLocaleString()}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">契約開始日</span>
                            <span class="info-value">${customer.contractStart ? new Date(customer.contractStart).toLocaleDateString('ja-JP') : '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">前回支払い日付</span>
                            <span class="info-value">${customer.lastPaymentDate ? new Date(customer.lastPaymentDate).toLocaleDateString('ja-JP') : '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">支払人</span>
                            <span class="info-value">${customer.payer || '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">支払い方法</span>
                            <span class="info-value">${getPaymentMethodText(customer.customerPaymentMethod) || '未設定'}</span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">契約ステータス</span>
                            <span class="info-value">${getContractStatusText(customer.contractStatus)}</span>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">

                const period = formatMonthPeriod(c.paidPeriodStart, c.paidPeriodEnd);
                const mailTo = c.mailAddress || c.address || '（送付先未設定）';
                // 入金日を payments から取得（periodStartは日付形式 or 月形式どちらでも対応）

                ) || (c.payments && c.payments[0]);

        function updateDefaultAmount() {

            // 契約金額は常にフル金額（年額）

        // 総額表示の更新
        function updateTotalDisplay() {
            const contract = parseInt(document.getElementById('contractAmount').value) || 0;
            const flower = parseInt(document.getElementById('flowerFee').value) || 0;
            const cycle = document.getElementById('paymentCycle').value;
            // 総額 = 契約金額 + 供花料（常にフル金額）
            document.getElementById('totalAmount').value = '¥' + (contract + flower).toLocaleString();
            // 1回の支払額：手動入力されていなければ自動計算
            if (!perPaymentManual) {
                const perPaymentEl = document.getElementById('perPaymentAmount');
                if (cycle === 'halfyearly') {
                    perPaymentEl.value = Math.round((contract + flower) / 2);
                } else {
                    perPaymentEl.value = contract + flower;
                }
            }
        }

        // 入金済み期間 → 次回入金予定期間の自動計算
        function autoFillNextPayment() {
            const startVal = document.getElementById('paidPeriodStart').value;
            const endVal = document.getElementById('paidPeriodEnd').value;
            if (!startVal || !endVal) return;
            // 期間の月数を計算
            const [sy, sm] = startVal.split('-').map(Number);
            const [ey, em] = endVal.split('-').map(Number);
            const months = (ey - sy) * 12 + (em - sm) + 1;
            if (months <= 0) return;
            // 次の開始 = 終了月の翌月
            let nextStartYear = ey;
            let nextStartMonth = em + 1;
            if (nextStartMonth > 12) { nextStartMonth = 1; nextStartYear++; }
            // 次の終了 = 次の開始 + 同じ月数 - 1
            let totalMonths = (nextStartYear * 12 + nextStartMonth) + months - 1;
            let nextEndYear = Math.floor((totalMonths - 1) / 12);
            let nextEndMonth = ((totalMonths - 1) % 12) + 1;
            const pad = n => String(n).padStart(2, '0');
            document.getElementById('nextPaymentStart').value = nextStartYear + '-' + pad(nextStartMonth);
            document.getElementById('nextPaymentEnd').value = nextEndYear + '-' + pad(nextEndMonth);
        }

        // 住所欄の郵便番号自動整形 + 住所自動取得
        let zipLookupDone = '';
        document.getElementById('address').addEventListener('input', function(e) {
            let val = this.value;
            // 先頭が数字で始まる場合、郵便番号として整形
            if (/^\d/.test(val.replace(/[〒\-\s]/g, ''))) {
                let digits = val.replace(/[^\d]/g, '');
                let rest = val.replace(/^[〒\s]*\d[\d\-\s]*/,'');
                if (digits.length <= 7) {
                    let formatted = '〒' + digits.slice(0, 3);
                    if (digits.length > 3) formatted += '-' + digits.slice(3, 7);
                    this.value = formatted + rest;
                }
                // 7桁揃ったら住所を自動取得
                if (digits.length === 7 && !rest && zipLookupDone !== digits) {
                    zipLookupDone = digits;
                    fetchAddressFromZip(digits);
                }
            }
        });

        function fetchAddressFromZip(zipCode) {
            const addressInput = document.getElementById('address');
            const currentVal = addressInput.value;
            fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode=' + zipCode)
                .then(res => res.json())
                .then(data => {
                    if (data.results && data.results.length > 0) {
                        const r = data.results[0];
                        const addr = r.address1 + r.address2 + r.address3;
                        addressInput.value = '〒' + zipCode.slice(0,3) + '-' + zipCode.slice(3) + ' ' + addr;
                    }
                })
                .catch(err => {
                    console.log('住所取得エラー:', err);
                });
        }

        // 電話番号の自動ハイフン挿入
        document.getElementById('phone').addEventListener('input', function(e) {
            let val = this.value.replace(/[^\d]/g, '');
            if (val.startsWith('0')) {
                if (val.startsWith('090') || val.startsWith('080') || val.startsWith('070') || val.startsWith('050')) {
                    // 携帯: 090-1234-5678
                    if (val.length > 3) val = val.slice(0, 3) + '-' + val.slice(3);
                    if (val.length > 8) val = val.slice(0, 8) + '-' + val.slice(8);
                    val = val.slice(0, 13);
                } else if (val.startsWith('0120') || val.startsWith('0800')) {
                    // フリーダイヤル: 0120-123-456
                    if (val.length > 4) val = val.slice(0, 4) + '-' + val.slice(4);
                    if (val.length > 8) val = val.slice(0, 8) + '-' + val.slice(8);
                    val = val.slice(0, 12);
                } else {
                    // 固定電話: 全て3-3-4形式 (099-281-5870)
                    if (val.length > 3) val = val.slice(0, 3) + '-' + val.slice(3);
                    if (val.length > 7) val = val.slice(0, 7) + '-' + val.slice(7);
                    val = val.slice(0, 12);
                }
            }
            this.value = val;
        });

        // === データ書き出し（エクスポート） ===
        function exportData() {
            const data = {
                customers: customers,
                groups: groups,
                exportDate: new Date().toISOString()
            };
            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '顧客台帳_' + new Date().toLocaleDateString('ja-JP').replace(/\//g, '-') + '.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // === データ読み込み（インポート） ===
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.customers || !Array.isArray(data.customers)) {
                        alert('正しいデータファイルではありません');
                        return;
                    }
                    const mode = confirm(
                        data.customers.length + '件のデータが見つかりました。\n\n' +
                        '【OK】→ 既存データを全て置き換え\n' +
                        '【キャンセル】→ 既存データに追加'
                    );
                    if (mode) {
                        customers = data.customers;
                        if (data.groups) groups = data.groups;
                    } else {
                        const existingIds = new Set(customers.map(c => c.id));
                        let added = 0;
                        data.customers.forEach(c => {
                            if (!existingIds.has(c.id)) {
                                customers.push(c);
                                added++;
                            }
                        });
                        if (data.groups) {
                            const existingGroupIds = new Set(groups.map(g => g.id));
                            data.groups.forEach(g => {
                                if (!existingGroupIds.has(g.id)) groups.push(g);
                            });
                        }
                        alert(added + '件追加しました');
                    }
                    saveData();
                    selectedCustomerId = null;
                    renderCustomersList();
                    renderDetailsPanel();
                    alert('データの読み込みが完了しました（' + customers.length + '件）');
                } catch (err) {
                    alert('ファイルの読み込みに失敗しました: ' + err.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

            localStorage.setItem('_ieNoHaka_v1', 'true');
        }
        migrateIeNoHaka();

        // 支払人・支払い方法の自動設定
        function migratePayerMethod() {
            if (localStorage.getItem('_payerMethod_v1')) return;
            let changed = false;
            customers.forEach(c => {
                if (!c.payer) {
                    c.payer = c.managerName || '';
                    changed = true;
                }
                if (!c.customerPaymentMethod) {
                    c.customerPaymentMethod = (c.address && c.address.includes('鹿児島')) ? 'cash' : 'transfer';
                    changed = true;
                }
            });
            if (changed) saveData();
            localStorage.setItem('_payerMethod_v1', 'true');
        }
        migratePayerMethod();

        // 入金済み期間のマイグレーション（令和6〜8年）
        function migratePaidPeriod() {
            if (localStorage.getItem('_paidPeriod_v1')) return;
            const year6 = ['赤星','牛飼','大野','川崎'];
            const year7 = ['大迫','小川','鼎','樺山','久木元','楠田','熊野','上妻','小久保'];
            const year8 = ['赤塚','有川','園','大重','岡崎','小倉','小原','仮屋','川畑','北野','木邑','久木田','黒岩','小城'];
            function getSurname(graveName) {
                return graveName.replace(/家之墓$|家の墓$|家$/, '').replace(/^「/,'').replace(/」$/,'').split(/[\/／]/)[0].trim();
            }
            function setPeriod(c, reiwaYear) {
                if (c.paidPeriodStart && c.paidPeriodEnd) return false;
                const westernYear = 2018 + reiwaYear;
                const isHalf = c.paymentCycle === 'halfyearly';
                if (isHalf) {
                    c.paidPeriodStart = westernYear + '-01';
                    c.paidPeriodEnd = westernYear + '-06';
                    c.nextPaymentStart = westernYear + '-07';
                    c.nextPaymentEnd = westernYear + '-12';
                } else {
                    c.paidPeriodStart = westernYear + '-01';
                    c.paidPeriodEnd = westernYear + '-12';
                    c.nextPaymentStart = (westernYear + 1) + '-01';
                    c.nextPaymentEnd = (westernYear + 1) + '-12';
                }
                return true;
            }
            let changed = false;
            customers.forEach(c => {
                const surname = getSurname(c.graveName);
                if (year6.some(n => surname === n || surname.startsWith(n))) {
                    if (setPeriod(c, 6)) changed = true;
                } else if (year7.some(n => surname === n || surname.startsWith(n))) {
                    if (setPeriod(c, 7)) changed = true;
                } else if (year8.some(n => surname === n || surname.startsWith(n))) {
                    if (setPeriod(c, 8)) changed = true;
                }
            });
            if (changed) saveData();
            localStorage.setItem('_paidPeriod_v1', 'true');
        }
        migratePaidPeriod();

        // 入金済み期間マイグレーション第2弾（令和5〜8年・サ行〜ナ行中心）
        function migratePaidPeriod2() {
            if (localStorage.getItem('_paidPeriod_v2')) return;
            function getSurname(graveName) {
                return graveName.replace(/家之墓$|家の墓$|家$/, '').replace(/^「/,'').replace(/」$/,'').split(/[\/／]/)[0].trim();
            }
            function setPeriod(c, reiwaYear) {
                if (c.paidPeriodStart && c.paidPeriodEnd) return false;
                const wy = 2018 + reiwaYear;
                const isHalf = c.paymentCycle === 'halfyearly';
                if (isHalf) {
                    c.paidPeriodStart = wy + '-01';
                    c.paidPeriodEnd = wy + '-06';
                    c.nextPaymentStart = wy + '-07';
                    c.nextPaymentEnd = wy + '-12';
                } else {
                    c.paidPeriodStart = wy + '-01';
                    c.paidPeriodEnd = wy + '-12';
                    c.nextPaymentStart = (wy + 1) + '-01';
                    c.nextPaymentEnd = (wy + 1) + '-12';
                }
                return true;
            }
            // マッチング: {name: 墓名の一部, manager: 管理者名の一部(任意)}
            const year5 = [
                {name:'徳留'}
            ];
            const year6 = [
                {name:'永吉'}
            ];
            const year7 = [
                {name:'崎元'},
                {name:'佐野'},
                {name:'土屋'},
                {name:'中尾', manager:'久美子'},
                {name:'中園', manager:'悦郎'},
                {name:'永田', manager:'塩田'},
                {name:'永田産婦人科'},
                {name:'西', manager:'伸一'}
            ];
            const year8 = [
                {name:'酒匂', manager:'信子'},
                {name:'迫田', manager:'治憲'},
                {name:'篠原', manager:'国彦'},
                {name:'諏訪'},
                {name:'田中中村'},
                {name:'田之上'},
                {name:'津曲'},
                {name:'鶴田'},
                {name:'寺田', manager: undefined, excludeManager:'信男'},
                {name:'中園', manager:'寺田信男'},
                {name:'中村', manager:'俊一郎'},
                {name:'新内'},
                {name:'新原'},
                {name:'西', manager:'高橋淑子'},
                {name:'西元'}
            ];
            function matches(c, rule) {
                const surname = getSurname(c.graveName);
                const gn = c.graveName || '';
                const mn = c.managerName || '';
                const nameMatch = surname === rule.name || surname.startsWith(rule.name) || gn.includes(rule.name);
                if (!nameMatch) return false;
                if (rule.manager && !mn.includes(rule.manager)) return false;
                if (rule.excludeManager && mn.includes(rule.excludeManager)) return false;
                return true;
            }
            let changed = false;
            customers.forEach(c => {
                for (const r of year5) { if (matches(c, r)) { if (setPeriod(c, 5)) changed = true; return; } }
                for (const r of year6) { if (matches(c, r)) { if (setPeriod(c, 6)) changed = true; return; } }
                for (const r of year7) { if (matches(c, r)) { if (setPeriod(c, 7)) changed = true; return; } }
                for (const r of year8) { if (matches(c, r)) { if (setPeriod(c, 8)) changed = true; return; } }
            });
            if (changed) saveData();
            localStorage.setItem('_paidPeriod_v2', 'true');
        }
        migratePaidPeriod2();

        // 入金済み期間マイグレーション第3弾（令和5〜10年・ハ行〜ワ行中心）
        function migratePaidPeriod3() {
            if (localStorage.getItem('_paidPeriod_v3')) return;
            function getSurname(graveName) {
                return graveName.replace(/家之墓$|家の墓$|家$/, '').replace(/^「/,'').replace(/」$/,'').split(/[\/／]/)[0].trim();
            }
            function setPeriod(c, reiwaYear) {
                if (c.paidPeriodStart && c.paidPeriodEnd) return false;
                const wy = 2018 + reiwaYear;
                const isHalf = c.paymentCycle === 'halfyearly';
                if (isHalf) {
                    c.paidPeriodStart = wy + '-01';
                    c.paidPeriodEnd = wy + '-06';
                    c.nextPaymentStart = wy + '-07';
                    c.nextPaymentEnd = wy + '-12';
                } else {
                    c.paidPeriodStart = wy + '-01';
                    c.paidPeriodEnd = wy + '-12';
                    c.nextPaymentStart = (wy + 1) + '-01';
                    c.nextPaymentEnd = (wy + 1) + '-12';
                }
                return true;
            }
            const year5 = [
                {name:'山崎'},
                {name:'吉満', sub:'小平'},
            ];
            const year6 = [
                {name:'馬場', manager:'信年'},
                {name:'東本願寺'},
                {name:'森', exact:true},
                {name:'横田'},
            ];
            const year7 = [
                {name:'久永'},
                {name:'平瀬'},
                {name:'前原'},
                {name:'松永'},
                {name:'南'},
                {name:'峯崎'},
                {name:'毛利'},
                {name:'持留'},
                {name:'森永', sub:'右'},
                {name:'山元', manager:'厚子'},
                {name:'山本', manager:'和人'},
                {name:'吉迫'},
            ];
            const year8 = [
                {name:'濵田', sub:'十字路'},
                {name:'東', exact:true},
                {name:'福崎'},
                {name:'福島', manager:'玲子'},
                {name:'福永', sub:'島名'},
                {name:'丸田'},
                {name:'宮内', manager:'玲子'},
                {name:'宮原', manager:'正二郎'},
                {name:'山田'},
                {name:'山本', manager:'良樹'},
            ];
            const year10 = [
                {name:'宮下', manager:'池田京子'},
            ];
            function matches(c, rule) {
                const surname = getSurname(c.graveName);
                const gn = c.graveName || '';
                const mn = c.managerName || '';
                if (rule.exact) {
                    if (surname !== rule.name && gn.replace(/家之墓$|家の墓$|家$/,'').trim() !== rule.name) return false;
                } else {
                    if (!surname.startsWith(rule.name) && !gn.includes(rule.name)) return false;
                }
                if (rule.sub && !gn.includes(rule.sub)) return false;
                if (rule.manager && !mn.includes(rule.manager)) return false;
                return true;
            }
            let changed = false;
            customers.forEach(c => {
                for (const r of year5)  { if (matches(c, r)) { if (setPeriod(c, 5))  changed = true; return; } }
                for (const r of year6)  { if (matches(c, r)) { if (setPeriod(c, 6))  changed = true; return; } }
                for (const r of year7)  { if (matches(c, r)) { if (setPeriod(c, 7))  changed = true; return; } }
                for (const r of year8)  { if (matches(c, r)) { if (setPeriod(c, 8))  changed = true; return; } }
                for (const r of year10) { if (matches(c, r)) { if (setPeriod(c, 10)) changed = true; return; } }
            });
            if (changed) saveData();
            localStorage.setItem('_paidPeriod_v3', 'true');
        }
        migratePaidPeriod3();

        // 受領書送付リストの初期設定（指定5件以外は全員済み）
        function migrateSendListInit() {
            if (localStorage.getItem('_sendListInit_v1')) return;
            // この5件だけ未送付のままにする
            const pending = [
                { name: '大野' },
                { name: '松本', manager: '黒岩' },
                { name: '栫井', manager: '邦彦' },
                { name: '住吉' },
                { name: '古田' },
            ];
            function getSurname(graveName) {
                return graveName.replace(/家之墓$|家の墓$|家$/, '').replace(/^「/,'').replace(/」$/,'').split(/[\/／]/)[0].trim();
            }
            function isPending(c) {
                const surname = getSurname(c.graveName);
                const mn = c.managerName || '';
                return pending.some(p => {
                    if (!surname.startsWith(p.name)) return false;
                    if (p.manager && !mn.includes(p.manager)) return false;
                    return true;
                });
            }
            let changed = false;
            customers.forEach(c => {
                if (!c.paidPeriodStart || !c.paidPeriodEnd) return;
                if (isPending(c)) return;
                if (!c.photoTaken) {
                    c.photoTaken = true;
                    c.photoTakenDate = new Date().toISOString();
                    c.photoTakenPeriod = c.paidPeriodStart + '_' + c.paidPeriodEnd;
                    changed = true;
                }
                if (!c.receiptSent) {
                    c.receiptSent = true;
                    c.receiptSentDate = new Date().toISOString();
                    c.receiptSentPeriod = c.paidPeriodStart + '_' + c.paidPeriodEnd;
                    changed = true;
                }
            });
            if (changed) saveData();
            localStorage.setItem('_sendListInit_v1', 'true');
        }
        migrateSendListInit();

        document.getElementById('sortOrder').value = sortOrder;
        renderCustomersList();
        renderDetailsPanel();
        updateSummary();
        updateSendListBadge();
    </script>
</body>
